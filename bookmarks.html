        icon: "mdi-briefcase",
        children: [
          {

            url: "https://www.notion.so/testdouble"

          {

          }
        ]

    const flatten = (bookmark) => bookmark.children ? bookmark.children.flatMap(flatten) : bookmark;
    const bookmarksFlat = bookmarks.flatMap(flatten);

    const {createApp} = Vue;

    const RootItem = {
      props: ['bookmark', 'isOpen'],
      emits: ['open'],
      template: `
        <Folder v-if="bookmark.children" :bookmark="bookmark" :root="true" :isOpen="isOpen" @open="$emit('open', $event)"/>
        <Bookmark v-else :bookmark="bookmark" :root="true"/>
      `
    };

    const Item = {
      props: ['bookmark', 'isOpen'],
      emits: ['open'],
      template: `
        <Folder v-if="bookmark.children" :bookmark="bookmark" :root="false" :isOpen="isOpen" @open="$emit('open', $event)"/>
        <Bookmark v-else :bookmark="bookmark" :root="false"/>
      `
    };

    const Folder = {
      props: ['bookmark', 'root', 'isOpen'],
      emits: ['open'],
      setup() {
        const openChildFolderTitle = Vue.ref(null);

        return {openChildFolderTitle};
      },
      template: `
        <li class="relative" :class="{open: isOpen}">
          <span @click.stop="$emit('open', bookmark.title)" class="flex flex-row justify-end items-center gap-2 cursor-pointer">
            <span v-if="!root" class="font-bold">{{ bookmark.title }}</span>
            <span class="iconify w-6 h-6" :data-icon="bookmark.icon || (isOpen ? 'mdi-folder-open' : 'mdi-folder')"></span>
          </span>
          <Transition name="folder">
          <ul v-show="isOpen" @click.stop class="absolute top-full right-0 text-right min-w-sm flex flex-col gap-4 mt-4">
            <Item v-for="child in bookmark.children" :key="child.title" :bookmark="child"
              :isOpen="child.children && openChildFolderTitle === child.title"
              @open="openChildFolderTitle = openChildFolderTitle === $event ? null : $event"/>
          </ul>
          </Transition>
        </li>
      `
    };

    const Bookmark = {
      props: ['bookmark', 'root'],
      setup(props) {
        const favicon_url = 'https://icons.duckduckgo.com/ip3/' + new URL(props.bookmark.url).hostname + '.ico';
        return {favicon_url};
      },
      template: `
        <li>
          <a :href="bookmark.url" class="flex flex-row justify-end items-center gap-2">
            <span v-if="!root" class="hover:underline">{{ bookmark.title }}</span>
            <span class="text-blue-600 hover:text-blue-800 dark:text-blue-400 dark:hover:text-blue-600" :data-tooltip="bookmark.title">
              <span v-if="bookmark.icon" class="iconify w-6 h-6" :data-icon="bookmark.icon"></span>
              <img v-else class="w-6 h-6" :src="favicon_url"/>
            </span>
          </a>
        </li>
      `
    };

    const Search = {
      props: ['bookmarks'],
      emits: ['active'],
      setup(props, {emit}) {
        const searchQuery = Vue.ref('');
        const fuse = new Fuse(props.bookmarks, {keys: ['title']});

        function close() {
          searchQuery.value = '';
        }

        function handleKey(event) {
          if (event.key === 'Escape') {
            close();
          } else if (event.key === 'Enter') {
            const results = fuse.search(searchQuery.value);
            if (results.length > 0) {
              emit('select', results[0].item.url);
            }
          } else if (event.key === 'Backspace') {
            searchQuery.value = searchQuery.value.slice(0, -1);
          } else if (
            event.key.length === 1 &&
            event.key.match(/^[a-zA-Z0-9 ]$/) &&
            !event.ctrlKey && !event.metaKey && !event.altKey
          ) {
            searchQuery.value += event.key;
          }

          if (searchQuery.value) {
            emit('active');
          }
        }

        Vue.onMounted(() => document.addEventListener('keyup', handleKey));
        Vue.onUnmounted(() => document.removeEventListener('keyup', handleKey));

        return {searchQuery, fuse, close};
      },
      expose: ['close'],
      template: `
        <div v-show="searchQuery" class="flex flex-col items-center pt-4">
          <span class="font-bold">&gt; {{ searchQuery }}</span>
          <ul class="flex flex-col items-center">
            <span v-for="result in fuse.search(searchQuery)" :key="result.item.title">
              <a :href="result.item.url" class="hover:underline">{{ result.item.title }}</a>
            </span>
          </ul>
        </div>
      `
    };

    const BookmarksBar = {
      props: ['bookmarks'],
      emits: ['active'],
      setup(props, {emit}) {
        const openFolderTitle = Vue.ref(null);

        function closeFolders() {
          openFolderTitle.value = null;
        }

        function openFolder(title) {
          openFolderTitle.value = openFolderTitle.value === title ? null : title;
          emit('active');
        }

        function handleKey(event) {
          if (event.key === 'Escape') {
            closeFolders();
          }
        }

        Vue.onMounted(() => document.addEventListener('click', closeFolders));
        Vue.onMounted(() => document.addEventListener('keyup', handleKey));
        Vue.onUnmounted(() => document.removeEventListener('click', closeFolders));
        Vue.onUnmounted(() => document.removeEventListener('keyup', handleKey));

        return {openFolderTitle, openFolder, closeFolders};
      },
      expose: ['closeFolders'],
      template: `
        <ul class="root flex flex-row justify-around pt-4">
          <RootItem v-for="bookmark in bookmarks" :key="bookmark.title" :bookmark="bookmark"
            :isOpen="openFolderTitle === bookmark.title"
            @open="openFolder"/>
        </ul>
      `
    };

    const app = createApp({
      data() {
        return {
          bookmarks,
          bookmarksFlat,
        };
      },
      methods: {
        barActive() {
          this.$refs.search.close();
        },
        searchActive() {
          this.$refs.bookmarksBar.closeFolders();
        },
        doSearch(url) {
          window.location.href = url;
        },
      },
      template: `
        <div>
          <BookmarksBar :bookmarks="bookmarks" @active="barActive" ref="bookmarksBar"/>
          <Search :bookmarks="bookmarksFlat" @active="searchActive" @select="doSearch" ref="search"/>
        </div>
      `
    });

    app.component('BookmarksBar', BookmarksBar);
    app.component('RootItem', RootItem);
    app.component('Item', Item);
    app.component('Folder', Folder);
    app.component('Bookmark', Bookmark);

    app.component('Search', Search);

    app.mount('#app');
  </script>
