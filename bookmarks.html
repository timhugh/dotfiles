    const {createApp} = Vue;

    const RootItem = {
      props: ['bookmark', 'isOpen'],
      emits: ['open'],
      template: `
        <Folder v-if="bookmark.children" :bookmark="bookmark" :root="true" :isOpen="isOpen" @open="$emit('open', $event)"/>
        <Bookmark v-else :bookmark="bookmark" :root="true"/>
      `
    };

    const Item = {
      props: ['bookmark', 'isOpen'],
      emits: ['open'],
      template: `
        <Folder v-if="bookmark.children" :bookmark="bookmark" :root="false" :isOpen="isOpen" @open="$emit('open', $event)"/>
        <Bookmark v-else :bookmark="bookmark" :root="false"/>
      `
    };

    const Folder = {
      props: ['bookmark', 'root', 'isOpen'],
      emits: ['open'],
      setup() {
        const openChildFolderTitle = Vue.ref(null);

        return {openChildFolderTitle};
      },
      template: `
        <li class="relative" :class="{open: isOpen}">
          <span @click.stop="$emit('open', bookmark.title)" class="flex flex-row justify-end items-center gap-2 cursor-pointer">
            <span v-if="!root" class="font-bold">{{ bookmark.title }}</span>
            <span class="iconify w-6 h-6" :data-icon="bookmark.icon || (isOpen ? 'mdi-folder-open' : 'mdi-folder')"></span>
          </span>
          <ul v-show="isOpen" @click.stop class="absolute top-full right-0 text-right min-w-sm flex flex-col gap-4 mt-4">
            <Item v-for="child in bookmark.children" :key="child.title" :bookmark="child"
              :isOpen="child.children && openChildFolderTitle === child.title"
              @open="openChildFolderTitle = openChildFolderTitle === $event ? null : $event"/>
          </ul>
        </li>
      `
    };

    const Bookmark = {
      props: ['bookmark', 'root'],
      setup(props) {
        const favicon_url = 'https://icons.duckduckgo.com/ip3/' + new URL(props.bookmark.url).hostname + '.ico';
        return {favicon_url};
      },
      template: `
        <li>
          <a :href="bookmark.url" class="flex flex-row justify-end items-center gap-2">
            <span v-if="!root" class="hover:underline">{{ bookmark.title }}</span>
            <span class="text-blue-600 hover:text-blue-800 dark:text-blue-400 dark:hover:text-blue-600" :data-tooltip="bookmark.title">
              <span v-if="bookmark.icon" class="iconify w-6 h-6" :data-icon="bookmark.icon"></span>
              <img v-else class="w-6 h-6" :src="favicon_url"/>
            </span>
          </a>
        </li>
      `
    };

    const TodoList = {
      template: `
        <div class="absolute bottom-4 left-4 text-xs text-neutral-500">
          <h2>Todo:</h2>
          <ul class="list-disc list-inside">
            <li>Folder slide animation</li>
          </ul>
        </div>
      `
    };

    const app = createApp({
      data() {
        return {
          bookmarks: bookmarks,
          bookmarksFlat: bookmarks.flatMap(bookmark => bookmark.children ? bookmark.children : bookmark),
          openFolderTitle: null,
          searchQuery: '',
          searchResults: []
        };
      },
      methods: {
        handleKeydown(event) {
          if (event.key === 'Escape') {
            this.closeFolders();
            this.cancelSearch();
          } else if (event.key === 'Enter') {
            this.search();
          } else {
            this.updateSearchResults(event);
          }
        },
        search() {
          if (this.searchResults.length > 0) {
            const firstResult = this.searchResults[0];
            window.location.href = firstResult.url;
          }
        },
        updateSearchResults(key) {
          if (event.key === 'Backspace') {
            this.searchQuery = this.searchQuery.slice(0, -1);
          } else if (
            event.key.length === 1 &&
            event.key.match(/^[a-zA-Z0-9 ]$/) &&
            !event.ctrlKey && !event.metaKey && !event.altKey
          ) {
            this.searchQuery += event.key;
          }

          if (this.searchQuery) {
            this.closeFolders();
            const fuse = new Fuse(this.bookmarksFlat, {keys: ['title']});
            this.searchResults = fuse.search(this.searchQuery).map(result => result.item);
          } else {
            this.searchResults = [];
          }
        },
        cancelSearch() {
          this.searchQuery = '';
        },
        closeFolders() {
          this.openFolderTitle = null;
        },
        openFolder(title) {
          this.openFolderTitle = this.openFolderTitle === title ? null : title;
        },
      },
      mounted() {
        document.addEventListener('click', this.closeAll);
        document.addEventListener('keydown', this.handleKeydown);
      },
      unmounted() {
        document.removeEventListener('click', this.closeAll);
        document.removeEventListener('keydown', this.handleKeydown);
      },
      template: `
        <div>
          <ul class="root flex flex-row justify-around pt-4">
            <RootItem v-for="bookmark in bookmarks" :key="bookmark.title" :bookmark="bookmark"
              :isOpen="openFolderTitle === bookmark.title"
              @open="openFolder"/>
          </ul>
          <div v-show="searchQuery" class="flex flex-col items-center pt-4">
            <span class="font-bold">&gt; {{ searchQuery }}</span>
            <ul class="flex flex-col items-center">
              <span v-for="result in searchResults" :key="result.title">{{ result.title }}</span>
            </ul>
          </div>
          <TodoList/>
        </div>
      `
    });

    app.component('RootItem', RootItem);
    app.component('Item', Item);
    app.component('Folder', Folder);
    app.component('Bookmark', Bookmark);

    app.component('TodoList', TodoList);

    app.mount('#app');
  </script>
